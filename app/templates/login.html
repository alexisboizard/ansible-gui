<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Ansible GUI</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/favicon.svg') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/favicon.svg') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script>
    (function() {
      const t = localStorage.getItem('theme');
      const isDark = t ? t === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.classList.add(isDark ? 'dark-theme' : 'light-theme');
    })();
  </script>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 6L34 28H6L20 6Z" fill="currentColor" fill-opacity="0.8"/>
          <circle cx="20" cy="30" r="5" fill="currentColor"/>
        </svg>
      </div>
      <h1 class="login-title">AnsibleGUI</h1>
      <p class="login-subtitle">Sign in to continue</p>
    </div>

    <div id="login-error" style="display:none;background:rgba(245,54,92,0.1);border:1px solid rgba(245,54,92,0.3);color:#f5365c;padding:10px 14px;border-radius:7px;font-size:13px;margin-bottom:16px"></div>

    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" class="form-control" id="username" placeholder="admin" autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" id="password" placeholder="••••••••"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>

    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:10px" onclick="doLogin()">
      Sign In
    </button>
  </div>
</div>

<script>
  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('login-error');

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      if (res.ok) {
        location.href = '/';
      } else {
        const data = await res.json();
        errEl.textContent = data.error || 'Invalid credentials';
        errEl.style.display = 'block';
      }
    } catch(e) {
      errEl.textContent = 'Connection error. Please try again.';
      errEl.style.display = 'block';
    }
  }
</script>
</body>
</html>
