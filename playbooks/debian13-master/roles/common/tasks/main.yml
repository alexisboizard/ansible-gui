---
- name: Mise à jour du cache APT
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Suppression des paquets obsolètes
  ansible.builtin.apt:
    name: "{{ packages_to_remove }}"
    state: absent
  when: packages_to_remove | length > 0

- name: Installation des outils de base
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present

- name: Configuration de vim comme éditeur par défaut
  ansible.builtin.alternatives:
    name: editor
    path: /usr/bin/vim.basic

- name: Configuration du timezone
  community.general.timezone:
    name: Europe/Paris

- name: Configuration du hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname_short }}"
  when: set_hostname | default(false)
