---
- name: Configuration SSH sécurisée
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0644"
    validate: "/usr/sbin/sshd -t -f %s"
    backup: true
  notify: Restart sshd

- name: S'assurer que SSH est activé et démarré
  ansible.builtin.systemd:
    name: ssh
    enabled: true
    state: started
